[build]
  publish = ".."
  ignore  = "exit 0"

# darkgraal3 serwowane z roota — 301 zachowuje relatywne ścieżki w HTML
[[redirects]]
  from = "/"
  to   = "/darkgraal3/"
  status = 301

[[redirects]]
  from = "/gmpanel"
  to   = "/darkgraal3/gmpanel.html"
  status = 301

# /hhighest/* → /hysteriahighest/* — 200 rewrite (URL w przeglądarce zostaje /hhighest)
[[redirects]]
  from = "/hhighest"
  to   = "/hysteriahighest/index.html"
  status = 200

[[redirects]]
  from = "/hhighest/gmpanel"
  to   = "/hysteriahighest/gmpanel.html"
  status = 200

[[redirects]]
  from = "/hhighest/*"
  to   = "/hysteriahighest/:splat"
  status = 200
