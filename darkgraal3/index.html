<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
    <title>Dark Graal III - The Widow of Camelot</title>
</head>
<body>

    <!-- TOP ROW: Figma embed — full width -->
    <div class="top-row">
        <div class="figma-panel">
            <iframe
                src="https://embed.figma.com/proto/cRgF5CYgj7FbcZxeavPTgt/Dark-Graal-III-The-Widow-of-Camelot?node-id=30-6&page-id=30%3A2&embed-host=share"
                allowfullscreen>
            </iframe>
            <div class="hide-footer"></div>
        </div>
    </div>

    <!-- BOTTOM ROW: Dice Roller -->
    <div class="bottom-row">

        <!-- Left Column: Form + Audio status -->
        <div class="roller-form">
            <h2 class="roller-title">Rzut Kośćmi</h2>

            <div class="fm-field">
                <label for="characterName" class="fm-label">Imię gracza</label>
                <input type="text" id="characterName" class="fm-input" placeholder="Wpisz swoje imię" autocomplete="off">
            </div>

            <div class="fm-grid-2">
                <div class="fm-field">
                    <label for="diceQuantity" class="fm-label">Liczba kości</label>
                    <input type="number" id="diceQuantity" class="fm-input" min="0" step="1" value="1">
                </div>
                <div class="fm-field">
                    <label for="modifier" class="fm-label">Modyfikator</label>
                    <input type="number" id="modifier" class="fm-input" step="1" value="0">
                </div>
            </div>

            <div class="fm-dice-row">
                <div class="fm-field" style="flex:1; min-width:0;">
                    <label for="diceType" class="fm-label">Wybierz kość</label>
                    <select id="diceType" class="fm-input">
                        <option value="2">d2</option>
                        <option value="4">d4</option>
                        <option value="6" selected>d6</option>
                        <option value="8">d8</option>
                        <option value="10">d10</option>
                        <option value="12">d12</option>
                        <option value="20">d20</option>
                        <option value="100">d100</option>
                    </select>
                </div>
                <div class="fm-btn-wrap">
                    <button id="rollButton" class="btn-roll">Rzuć</button>
                </div>
            </div>

            <!-- Audio status — minimal, below the form -->
            <div class="audio-mini">
                <div class="audio-mini-status">
                    <span class="audio-dot" id="audioStatusDot"></span>
                    <span class="audio-mini-text" id="audioStatusText">Brak transmisji</span>
                </div>
                <div class="audio-mini-volume" id="audioVolumeRow" style="display:none;">
                    <label for="volumeSlider" class="audio-mini-label">Głośność</label>
                    <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="0.8">
                </div>
                <audio id="remoteAudio" autoplay></audio>
            </div>
        </div>

        <!-- Right Column: Result + History -->
        <div class="roller-history">

            <div id="rollResult" class="roll-result-box">
                <svg class="dice-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><path d="M16 8h.01"/><path d="M8 8h.01"/><path d="M8 16h.01"/><path d="M16 16h.01"/><path d="M12 12h.01"/></svg>
                <p class="result-placeholder">Kliknij "Rzuć", aby wykonać rzut</p>
            </div>

            <div class="dice-info" id="diceInfo">Aktualna kość: d6 (1-6)</div>

            <div id="historySection" style="display:none;">
                <h3 class="history-title">Historia rzutów</h3>
                <ul id="rollHistory" class="roll-history-list"></ul>
            </div>

            <p class="firebase-note">Dane są zapisywane w Firebase.</p>
        </div>

    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
